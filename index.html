<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <main>
    <div class="outer-container">
      <div class="img-container">
          <img id="preview" src="images/image-equilibrium.jpg" alt="preview">
      </div>
      <div class="content-box">
        <div class="top-box">
            <h1 id="heading">Equilibrium #3429</h1>
            <p id="about">Our Equilibrium collection promotes balance and calm.</p>
            <div>
              <div class="">
                <img src="images/icon-ethereum.svg" alt="ethereum">
                <h4 style="color: hsl(178, 100%, 50%)">0.041ETH</h4>
              </div>
              <div class="">
                <img src="images/icon-clock.svg" alt="clock">
                <p>3days left</p>
              </div>
            </div>
        </div>
        <div class="bottom-box">
           <img id="avatar" src="images/image-avatar.png" alt="avatar">
           <p>Creation of <span style="color: hsl(0, 0%, 100%)">Jules Wayne</span></p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
